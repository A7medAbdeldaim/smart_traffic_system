services:
  - type: web
    name: smart-traffic-system
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: MODE
        value: demo
      - key: DATABASE_TYPE
        value: sqlite
    healthCheckPath: /api/stats
